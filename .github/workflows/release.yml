name: Release

on:
  push:
    tags: ["v*"]

# Tag-only: reusable release jobs derive package versions from the tag.

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Tags must already include tree-sitter-managed version metadata and generated artifacts.
  verify-version:
    name: Verify version metadata matches tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Sync with package.json and ci.yml for reproducible generated files.
          tree-sitter-ref: v0.26.9

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check tree-sitter-managed version metadata
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          echo "Checking tree-sitter-managed version metadata for ${version}"

          # Let tree-sitter update every version-bearing file it owns.
          tree-sitter version "$version"
          tree-sitter generate
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

          if [ -z "$(git status --porcelain)" ]; then
            echo "Version metadata is already committed for ${GITHUB_REF_NAME}."
            exit 0
          fi

          echo "::error::Version metadata is not fully committed for ${GITHUB_REF_NAME}."
          echo "Run these commands before creating the release tag, then commit the resulting changes:"
          echo "  tree-sitter version ${version}"
          echo "  tree-sitter generate"
          echo "  npm install --package-lock-only --ignore-scripts --no-audit --no-fund"
          echo ""
          echo "Changed files after applying version metadata checks:"
          git status --short
          echo ""
          echo "Diff summary:"
          git --no-pager diff --stat
          echo ""
          echo "Diff:"
          git --no-pager diff --no-ext-diff
          exit 1

  # Environment approval gates all publish jobs after npm binaries are built.
  release-approval:
    name: Approve release
    needs: [verify-version, npm-wasm, npm-prebuilds]
    runs-on: ubuntu-24.04
    permissions: {}
    environment: release
    steps:
      - name: Confirm release
        run: echo "Release ${GITHUB_REF_NAME} approved; publishing."

  github-release:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/release.yml@216133f5cb4469b112c5e83415869e58b25c353a

  crates:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/package-crates.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_REGISTRY_TOKEN}}

  pypi:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/package-pypi.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      PYPI_API_TOKEN: ${{secrets.PYPI_API_TOKEN}}

  npm-wasm:
    name: Build npm Wasm binary
    needs: verify-version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --omit peer --omit optional

      - name: Build Wasm binary
        run: npm x -- tree-sitter build --wasm

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: "*.wasm"
          name: prebuilds-wasm
          # Keep artifacts through manual approval.
          retention-days: 5

  npm-prebuilds:
    name: Build npm prebuild on ${{matrix.os}}
    needs: verify-version
    runs-on: ${{matrix.os}}
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --omit peer --omit optional

      - name: Build binary
        run: npm x -- prebuildify -t 20.19.5

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: prebuilds/**
          name: prebuilds-${{matrix.os}}
          # Keep artifacts through manual approval.
          retention-days: 5

  # npm uses OIDC trusted publishing; no long-lived token is needed.
  npm:
    name: Publish npm package
    needs: [release-approval, npm-wasm, npm-prebuilds]
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/@felixtensor/tree-sitter-mlir
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org/

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Update npm
        run: npm install -g npm@11

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: prebuilds
          pattern: prebuilds-*
          merge-multiple: true

      - name: Move Wasm binary to root
        run: mv -v prebuilds/*.wasm .

      - name: Publish to npm
        run: npm publish
