name: Release

on:
  push:
    tags: ["v*"]

# No workflow_dispatch: the reusable release.yml derives the version from the
# tag, so a branch-ref dispatch would cut a bogus release.

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Block the release if the tag and any manifest version disagree. `tree-sitter
  # version` rewrites every version-bearing file (Cargo.toml, package.json,
  # package-lock.json, pyproject.toml, tree-sitter.json, Makefile, CMakeLists.txt,
  # build.zig.zon) to the tag, so a non-empty diff means something was out of sync.
  verify-version:
    name: Verify versions match tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Check manifests match the tag
        run: |
          tree-sitter version "${GITHUB_REF_NAME#v}"
          if ! git diff --quiet; then
            echo "::error::Version files are out of sync with tag ${GITHUB_REF_NAME}:"
            git --no-pager diff --name-only
            exit 1
          fi

  github-release:
    needs: verify-version
    uses: tree-sitter/workflows/.github/workflows/release.yml@216133f5cb4469b112c5e83415869e58b25c353a

  crates:
    needs: verify-version
    uses: tree-sitter/workflows/.github/workflows/package-crates.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_REGISTRY_TOKEN}}

  pypi:
    needs: verify-version
    uses: tree-sitter/workflows/.github/workflows/package-pypi.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      PYPI_API_TOKEN: ${{secrets.PYPI_API_TOKEN}}

  # npm publishes via OIDC trusted publishing (no token; npm write tokens now cap
  # at 90 days). Needs a trusted publisher (this repo + release.yml) set on npmjs.
  npm-wasm:
    name: Build npm Wasm binary
    needs: verify-version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"

      - name: Install dependencies
        run: npm i --omit peer --omit optional

      - name: Build Wasm binary
        run: npm x -- tree-sitter build --wasm

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: "*.wasm"
          name: prebuilds-wasm
          retention-days: 2

  npm-prebuilds:
    name: Build npm prebuild on ${{matrix.os}}
    needs: verify-version
    runs-on: ${{matrix.os}}
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"

      - name: Install dependencies
        run: npm i --omit peer --omit optional

      - name: Build binary
        run: npm x -- prebuildify -t 20.19.5

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: prebuilds/**
          name: prebuilds-${{matrix.os}}
          retention-days: 2

  npm:
    name: Publish npm package
    needs: [npm-wasm, npm-prebuilds]
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/@felixtensor/tree-sitter-mlir
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"
          registry-url: https://registry.npmjs.org/

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: prebuilds
          pattern: prebuilds-*
          merge-multiple: true

      - name: Move Wasm binary to root
        run: mv -v prebuilds/*.wasm .

      - name: Publish to npm
        run: npm publish
