name: Release

on:
  push:
    tags: ["v*"]

# Tag-only: reusable release jobs derive package versions from the tag.

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # Block the release if the tag version is not fully reflected in the files
  # that tree-sitter itself manages. Avoid hard-coding version-bearing paths:
  # let the tree-sitter CLI update everything it knows about, regenerate parser
  # metadata, then require the checkout to remain clean.
  #
  # This is a belt-and-suspenders check: main is the real gate (a branch
  # ruleset makes the CI "Check generated files" status check required, so a
  # stale parser.c can't reach main in the first place). We only tag commits
  # that are already green.
  verify-version:
    name: Verify version metadata matches tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Pin to the tree-sitter-cli version in package.json so `generate` is
          # reproducible; a drifting CLI would make this gate fail spuriously.
          # Bump this together with package.json's tree-sitter-cli.
          tree-sitter-ref: v0.26.9

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Check tree-sitter-managed version metadata
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          echo "Checking tree-sitter-managed version metadata for ${version}"

          # `tree-sitter version` is the source of truth for version-bearing
          # metadata files. `tree-sitter generate` stamps that version into
          # generated artifacts such as src/parser.c.
          tree-sitter version "$version"
          tree-sitter generate
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

          if [ -z "$(git status --porcelain)" ]; then
            echo "Version metadata is already committed for ${GITHUB_REF_NAME}."
            exit 0
          fi

          echo "::error::Version metadata is not fully committed for ${GITHUB_REF_NAME}."
          echo "Run these commands before creating the release tag, then commit the resulting changes:"
          echo "  tree-sitter version ${version}"
          echo "  tree-sitter generate"
          echo "  npm install --package-lock-only --ignore-scripts --no-audit --no-fund"
          echo ""
          echo "Changed files after applying version metadata checks:"
          git status --short
          echo ""
          echo "Diff summary:"
          git --no-pager diff --stat
          echo ""
          echo "Diff:"
          git --no-pager diff --no-ext-diff
          exit 1

  # Manual approval checkpoint in front of every publish job. Replaces the old
  # cross-workflow check-run scraping (which raced main's CI and was coupled to
  # job-name strings). The gate is the `release` environment's "Required
  # reviewers" rule (Settings -> Environments), currently armed, so each
  # release waits for a maintainer to approve before any publish job runs.
  # It needs the npm build jobs so the prompt only appears once binaries are
  # green; a build failure then blocks every publish (no partial release).
  release-approval:
    name: Approve release
    needs: [verify-version, npm-wasm, npm-prebuilds]
    runs-on: ubuntu-24.04
    permissions: {}
    environment: release
    steps:
      - name: Confirm release
        run: echo "Release ${GITHUB_REF_NAME} approved; publishing."

  github-release:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/release.yml@216133f5cb4469b112c5e83415869e58b25c353a

  crates:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/package-crates.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      CARGO_REGISTRY_TOKEN: ${{secrets.CARGO_REGISTRY_TOKEN}}

  pypi:
    needs: release-approval
    uses: tree-sitter/workflows/.github/workflows/package-pypi.yml@216133f5cb4469b112c5e83415869e58b25c353a
    secrets:
      PYPI_API_TOKEN: ${{secrets.PYPI_API_TOKEN}}

  npm-wasm:
    name: Build npm Wasm binary
    needs: verify-version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --omit peer --omit optional

      - name: Build Wasm binary
        run: npm x -- tree-sitter build --wasm

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: "*.wasm"
          name: prebuilds-wasm
          # Outlast the release-approval wait before the npm job downloads these.
          retention-days: 5

  npm-prebuilds:
    name: Build npm prebuild on ${{matrix.os}}
    needs: verify-version
    runs-on: ${{matrix.os}}
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - windows-2025
          - windows-11-arm
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --omit peer --omit optional --ignore-scripts

      - name: Build binary
        run: npm x -- prebuildify -t 20.19.5

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: prebuilds/**
          name: prebuilds-${{matrix.os}}
          # Outlast the release-approval wait before the npm job downloads these.
          retention-days: 5

  # npm uses OIDC trusted publishing; no long-lived token is needed.
  npm:
    name: Publish npm package
    needs: [release-approval, npm-wasm, npm-prebuilds]
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/@felixtensor/tree-sitter-mlir
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org/

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Update npm
        run: npm install -g npm@11

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: prebuilds
          pattern: prebuilds-*
          merge-multiple: true

      - name: Move Wasm binary to root
        run: mv -v prebuilds/*.wasm .

      - name: Publish to npm
        run: npm publish
