name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # GitHub hosted runners force JavaScript actions to Node 24 from 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Keep in sync with package.json's tree-sitter-cli and release.yml.
          tree-sitter-ref: v0.26.9

      # Tier 1: Corpus tests & Binding tests
      - name: Run parser and binding tests
        uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: true
          node-version: "22"
          test-python: true
          test-go: true
          go-version: "1.23"
          test-swift: true
          test-zig: true

      # Parse examples without ERROR nodes as a required integration corpus.
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        id: parse-files
        with:
          files: examples/**/*.mlir

      - name: Upload parse failures
        if: ${{ failure() && steps.parse-files.outputs.failures != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: parse-failures-${{matrix.os}}
          path: ${{steps.parse-files.outputs.failures}}
          retention-days: 7

  # Root-cause gate for the 0.1.2 incident: a stale src/parser.c (including the
  # version metadata stamped from tree-sitter.json) must never reach main. We
  # regenerate from grammar.js and require the result to be already committed.
  generated:
    name: Check generated files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Keep in sync with package.json's tree-sitter-cli and release.yml.
          tree-sitter-ref: v0.26.9

      - name: Verify committed parser is up to date
        run: |
          set -euo pipefail

          tree-sitter generate

          if [ -z "$(git status --porcelain)" ]; then
            echo "Generated files are up to date."
            exit 0
          fi

          echo "::error::Generated files are out of date. Run 'tree-sitter generate' and commit the result."
          git status --short
          echo ""
          git --no-pager diff --no-ext-diff
          exit 1
