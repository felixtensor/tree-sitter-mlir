name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Hosted runners force JavaScript actions to Node 24 starting 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Sync with package.json and release.yml.
          tree-sitter-ref: v0.26.9

      - name: Run parser tests
        uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: true
          go-version: "1.23"
          test-swift: false
          test-zig: false

      # Required integration corpus: examples must parse without ERROR nodes.
      - name: Parse examples
        uses: tree-sitter/parse-action@v4
        id: parse-files
        with:
          files: examples/**/*.mlir

      - name: Upload parse failures
        if: ${{ failure() && steps.parse-files.outputs.failures != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: parse-failures-${{matrix.os}}
          path: ${{steps.parse-files.outputs.failures}}
          retention-days: 7

  # Regenerate parser artifacts and fail if committed files are stale.
  generated:
    name: Check generated files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          # Sync with package.json and release.yml.
          tree-sitter-ref: v0.26.9

      - name: Verify committed parser is up to date
        run: |
          set -euo pipefail

          tree-sitter generate

          if [ -z "$(git status --porcelain)" ]; then
            echo "Generated files are up to date."
            exit 0
          fi

          echo "::error::Generated files are out of date. Run 'tree-sitter generate' and commit the result."
          git status --short
          echo ""
          git --no-pager diff --no-ext-diff
          exit 1

      # Errors-only: every shipped query must compile against the grammar.
      # tree-sitter test exercises highlights.scm only, so this is the sole
      # guard for locals/tags/folds/indents/injections node-name drift.
      - name: Check queries compile against grammar
        run: |
          set -euo pipefail
          example="$(find examples -name '*.mlir' -print -quit)"
          for query in queries/*.scm; do
            echo "Compiling ${query}"
            tree-sitter query "${query}" "${example}" >/dev/null
          done

  # Bench tooling tests + AST surface gate. Errors-only: fails on a new parse
  # error or an AST-shape change in examples/; no speed data is recorded or gated.
  bench:
    name: Bench gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run bench tooling tests
        run: npm run test:bench

      - name: Verify examples AST surface manifest
        run: node bench.mjs --verify
