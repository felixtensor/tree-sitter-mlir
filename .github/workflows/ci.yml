name: CI

on: [push, pull_request]

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate parser
        run: npm run compile

      # Tier 1: Corpus tests (AST snapshot verification) — must pass
      - name: Run corpus tests
        run: npm test

      # Tier 2: Examples tests (no ERROR nodes) — informational for now
      # Using continue-on-error because the parser doesn't yet pass all
      # official MLIR tests. Remove continue-on-error once pass rate is 100%.
      - name: Parse examples
        continue-on-error: true
        run: npx tree-sitter parse --quiet --stat examples/**/*.mlir
